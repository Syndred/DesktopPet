name: Release Rollback

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Target release version to rollback to"
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run release:rollback -- --target=${{ inputs.target_version }}
      - uses: actions/upload-artifact@v4
        with:
          name: rollback-state-${{ inputs.target_version }}
          path: |
            release-state/current.json
            release-state/last-rollback.json

